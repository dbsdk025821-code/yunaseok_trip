<script type="module">
  // ===== Firebase 실시간 공유 설정 =====
  // 아래 firebaseConfig 값만 본인 프로젝트 값으로 바꾸면 바로 연결돼.
  // roomId는 비밀번호 0729를 그대로 사용해 같은 방 데이터로 동기화되게 했어.
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = window.FIREBASE_CONFIG || {
    apiKey: "",
    authDomain: "",
    projectId: "",
    storageBucket: "",
    messagingSenderId: "",
    appId: ""
  };

  const hasFirebaseConfig = !!(firebaseConfig.apiKey && firebaseConfig.projectId && firebaseConfig.appId);
  let db = null;
  let sharedDocRef = null;
  let suppressRemoteApply = false;

  if (hasFirebaseConfig) {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    const roomId = "0729";
    sharedDocRef = doc(db, "travel_planner_rooms", roomId);

    window.startRealtimeSync = function startRealtimeSync() {
      onSnapshot(sharedDocRef, (snap) => {
        if (!snap.exists()) return;
        const remote = snap.data();
        if (!remote || !remote.payload) return;
        suppressRemoteApply = true;
        try {
          if (typeof applyImportedData === "function") {
            applyImportedData(remote.payload);
          }
        } finally {
          setTimeout(() => suppressRemoteApply = false, 150);
        }
      });
    };

    window.pushSharedState = async function pushSharedState() {
      if (!sharedDocRef) return;
      if (suppressRemoteApply) return;
      if (typeof getCurrentData !== "function") return;
      const payload = getCurrentData();
      await setDoc(sharedDocRef, {
        payload,
        updatedAt: serverTimestamp()
      }, { merge: true });
    };
  } else {
    window.startRealtimeSync = function(){};
    window.pushSharedState = async function(){};
  }

  window.hasFirebaseConfig = hasFirebaseConfig;
</script>

<script>
async function syncSharedStateSafe(){
  try{
    if (typeof pushSharedState === "function") {
      await pushSharedState();
    }
  }catch(err){
    console.error("실시간 저장 실패", err);
  }
}


const PASSWORD = "0729";
let editMode = false;
let savedRange = null;
let activeEditable = null;

function getCurrentData(){
  return {
    days: document.getElementById('days').innerHTML,
    title: document.getElementById('mainTitle').innerHTML
  };
}

function setCurrentData(data){
  document.getElementById('days').innerHTML = data.days || '';
  document.getElementById('mainTitle').innerHTML = data.title || '해외 일정표';
}

function getEmbeddedData(){
  const el = document.getElementById('sharedData');
  if(!el) return null;
  try{
    return JSON.parse(el.textContent || '{}');
  }catch(e){
    return null;
  }
}


const emojiData = {
  heart:["🩷","❤️","🧡","💛","💚","🩵","💙","💜","🖤","🩶","🤍","🤎","💖","💕","💓","💗"],
  emphasis:["❣️","❕","❔","✨","〰️","👍🏻","🫶🏻","⚡️","💦","❌","❗️","❓","💯","✅","✔️","☑️"],
  basic:["😊","🥹","😂","😭","😎","🥰","🙌","👏","🔥","🌸","✈️","📅","📍","📝","🎟️","💸"]
};

function login(){
  const pwInput = document.getElementById('pw');
  const msg = document.getElementById('msg');
  const p = (pwInput.value || '').trim();
  if(p === PASSWORD){
    msg.innerText = '';
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').classList.remove('hidden');
    renderEmojiPanel();
    load();
  }else{
    msg.innerText = '비밀번호가 틀렸어. 다시 확인해줘.';
    pwInput.focus();
    pwInput.select();
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const pwInput = document.getElementById('pw');
  if(pwInput){
    pwInput.addEventListener('keydown', (e) => {
      if(e.key === 'Enter'){
        e.preventDefault();
        login();
      }
    });
  }
});


function setActiveEditable(el){
  document.querySelectorAll('.editable.edit-target').forEach(item => item.classList.remove('edit-target'));
  activeEditable = el || null;
  if(activeEditable) activeEditable.classList.add('edit-target');
}

function positionEmojiPanel(){
  const panel = document.getElementById('emojiPanel');
  if(!panel || panel.classList.contains('hidden') || !activeEditable) return;
  const rect = activeEditable.getBoundingClientRect();
  const panelSize = 280;
  const scrollY = window.scrollY;
  const scrollX = window.scrollX;
  let top = rect.top + scrollY - panelSize - 12;
  if(top < scrollY + 10){
    top = rect.bottom + scrollY + 12;
  }
  let left = rect.left + scrollX;
  const maxLeft = scrollX + window.innerWidth - panelSize - 12;
  if(left > maxLeft) left = Math.max(scrollX + 12, maxLeft);
  if(left < scrollX + 12) left = scrollX + 12;
  panel.style.top = top + 'px';
  panel.style.left = left + 'px';
}

function toggleEdit(){
  editMode = !editMode;

  document.querySelectorAll('.editable').forEach(el => {
    el.contentEditable = editMode;
  });

  document.querySelectorAll('.edit-only').forEach(el => {
    el.classList.toggle('hidden', !editMode);
  });

  document.getElementById('formatBar').classList.toggle('hidden', !editMode);
  document.getElementById('emojiPanel').classList.add('hidden');
  if(!editMode) setActiveEditable(null);
  document.getElementById('editActionBar').classList.toggle('hidden', !editMode);
  document.getElementById('editToggleBtn').innerText = editMode ? '수정 종료' : '수정';
}

function rememberSelection(){
  const sel = window.getSelection();
  if(sel.rangeCount > 0){
    savedRange = sel.getRangeAt(0).cloneRange();
    const node = sel.anchorNode;
    if(node){
      const target = node.nodeType === 1 ? node.closest('.editable') : node.parentElement && node.parentElement.closest('.editable');
      if(target) setActiveEditable(target);
    }
  }
}

document.addEventListener('selectionchange', () => {
  if(editMode) rememberSelection();
});

document.addEventListener('mouseup', () => {
  if(editMode) rememberSelection();
});

document.addEventListener('keyup', () => {
  if(editMode) rememberSelection();
});

function restoreSelection(){
  if(!savedRange) return false;
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(savedRange);
  return true;
}

function format(cmd){
  restoreSelection();
  document.execCommand(cmd, false, null);
  rememberSelection();
}

function colorText(color){
  restoreSelection();
  document.execCommand('styleWithCSS', false, true);
  document.execCommand('foreColor', false, color);
  rememberSelection();
}

function fontSize(size){
  if(!size) return;
  restoreSelection();
  const sel = window.getSelection();
  if(!sel.rangeCount || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  const span = document.createElement('span');
  span.style.fontSize = size + 'pt';
  try{
    range.surroundContents(span);
  }catch(e){
    const frag = range.extractContents();
    span.appendChild(frag);
    range.insertNode(span);
  }
  sel.removeAllRanges();
  const newRange = document.createRange();
  newRange.selectNodeContents(span);
  sel.addRange(newRange);
  savedRange = newRange.cloneRange();
}

function toggleEmojiPanel(){
  if(!editMode) return;
  const panel = document.getElementById('emojiPanel');
  if(panel.classList.contains('hidden')){
    if(!activeEditable){
      const firstEditable = document.querySelector('.editable[contenteditable="true"]');
      if(firstEditable) setActiveEditable(firstEditable);
    }
    positionEmojiPanel();
    panel.classList.remove('hidden');
    positionEmojiPanel();
  }else{
    panel.classList.add('hidden');
  }
}

function renderEmojiPanel(){
  makeEmojiButtons('emojiHeart', emojiData.heart);
  makeEmojiButtons('emojiEmphasis', emojiData.emphasis);
  makeEmojiButtons('emojiBasic', emojiData.basic);
}

function makeEmojiButtons(id, arr){
  const box = document.getElementById(id);
  box.innerHTML = '';
  arr.forEach(item => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'emoji-item';
    btn.textContent = item;
    btn.onclick = () => insertEmoji(item);
    box.appendChild(btn);
  });
}

function insertEmoji(emoji){
  restoreSelection();
  document.execCommand('insertText', false, emoji);
  rememberSelection();
  positionEmojiPanel();
}

function changeLayout(sel){
  const box = sel.parentNode.querySelector('.schedule');
  if(sel.value === 'A'){
    box.innerHTML = `
      <table>
        <tr>
          <th>시간</th>
          <th>일정</th>
          <th>기타</th>
        </tr>
        <tr>
          <td class="editable">09:00</td>
          <td class="editable">일정</td>
          <td class="editable"></td>
        </tr>
      </table>
    `;
  }else{
    box.innerHTML = `
      <div contenteditable="${editMode}" class="editable" style="min-height:120px;padding:12px;border:1px solid #dfe4ea;border-radius:12px;">
        블로그처럼 글 작성 + 사진 첨부 가능
      </div>
      <input type="file" accept="image/*" onchange="addImage(event,this)" style="margin-top:10px;">
    `;
  }
}

function addImage(e,input){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(){
    const img = document.createElement('img');
    img.src = reader.result;
    img.style.width = '220px';
    img.onclick = function(){
      const size = prompt('사진 너비(px)', img.style.width.replace('px',''));
      if(size) img.style.width = size + 'px';
    };
    input.parentNode.appendChild(img);
  };
  reader.readAsDataURL(file);
}

function addRow(btn){
  const table = btn.parentNode.querySelector('table');
  if(!table) return;
  const row = table.insertRow();
  row.innerHTML = `
    <td class="editable">시간</td>
    <td class="editable">일정</td>
    <td class="editable"></td>
  `;
  if(editMode){
    row.querySelectorAll('.editable').forEach(el => el.contentEditable = true);
  }
}

function previewMap(btn){
  const link = btn.parentNode.querySelector('.maplink').value.trim();
  if(!link) return;
  const preview = btn.parentNode.parentNode.querySelector('.map-preview');
  preview.innerHTML = `<iframe src="${link}"></iframe>`;
}

function init(){
  document.querySelectorAll('.day-header').forEach(h => {
    h.onclick = function(e){
      if(editMode && e.target === this) rememberSelection();
      const body = this.nextElementSibling;
      body.style.display = body.style.display === 'block' ? 'none' : 'block';
    };
  });

  document.querySelectorAll('.collapsible').forEach(el => {
    el.onclick = function(){
      const c = this.nextElementSibling;
      c.style.display = c.style.display === 'block' ? 'none' : 'block';
    };
  });

  document.querySelectorAll('.editable').forEach(el => {
    el.contentEditable = editMode;
    el.onfocus = function(){
      if(editMode){
        setActiveEditable(this);
        positionEmojiPanel();
      }
    };
    el.onclick = function(){
      if(editMode){
        setActiveEditable(this);
        positionEmojiPanel();
      }
    };
  });

  document.querySelectorAll('.edit-only').forEach(el => {
    el.classList.toggle('hidden', !editMode);
  });
}


window.addEventListener('resize', positionEmojiPanel);
window.addEventListener('scroll', positionEmojiPanel);

document.addEventListener('click', (e) => {
  const panel = document.getElementById('emojiPanel');
  if(!panel || panel.classList.contains('hidden')) return;
  if(panel.contains(e.target) || e.target.classList.contains('emoji-btn')) return;
  if(e.target.closest('.editable')) return;
  panel.classList.add('hidden');
});

function save(){
  const data = getCurrentData();
  localStorage.setItem('travelPlannerData', JSON.stringify(data));
  alert('저장됨');
}

function load(){
  const embedded = getEmbeddedData();
  const raw = localStorage.getItem('travelPlannerData');

  if(raw){
    try{
      setCurrentData(JSON.parse(raw));
    }catch(e){
      if(embedded){
        setCurrentData(embedded);
      }else{
        document.getElementById('days').innerHTML = localStorage.getItem('travelPlannerData') || '';
        document.getElementById('mainTitle').innerHTML = localStorage.getItem('travelPlannerTitle') || '해외 일정표';
      }
    }
  }else if(embedded){
    setCurrentData(embedded);
  }else{
    const oldData = localStorage.getItem('travelPlannerData');
    const oldTitle = localStorage.getItem('travelPlannerTitle');
    if(oldData) document.getElementById('days').innerHTML = oldData;
    if(oldTitle) document.getElementById('mainTitle').innerHTML = oldTitle;
  }

  init();
}


function openExportConfirm(){
  const modal = document.getElementById('exportModalBackdrop');
  if(modal) modal.style.display = 'flex';
}

function closeExportConfirm(e){
  if(e && e.target && e.target.id !== 'exportModalBackdrop') return;
  const modal = document.getElementById('exportModalBackdrop');
  if(modal) modal.style.display = 'none';
}

function exportData(){
  closeExportConfirm();
  syncSharedStateSafe();
  const data = getCurrentData();
  const clone = document.documentElement.cloneNode(true);

  clone.querySelector('#login').style.display = '';
  clone.querySelector('#app').classList.add('hidden');
  clone.querySelector('#pw').value = '';
  clone.querySelector('#msg').innerText = '';

  const editActionBar = clone.querySelector('#editActionBar');
  if(editActionBar) editActionBar.classList.add('hidden');
  const formatBar = clone.querySelector('#formatBar');
  if(formatBar) formatBar.classList.add('hidden');
  const emojiPanel = clone.querySelector('#emojiPanel');
  if(emojiPanel) emojiPanel.classList.add('hidden');
  const editToggleBtn = clone.querySelector('#editToggleBtn');
  if(editToggleBtn) editToggleBtn.innerText = '수정';

  clone.querySelectorAll('[contenteditable="true"]').forEach(el => el.setAttribute('contenteditable','false'));

  let shared = clone.querySelector('#sharedData');
  if(!shared){
    shared = document.createElement('script');
    shared.id = 'sharedData';
    shared.type = 'application/json';
    clone.body.insertBefore(shared, clone.body.querySelector('script'));
  }
  shared.textContent = JSON.stringify(data).replace(/<\/script>/gi,'<\/script>');

  const blob = new Blob([`<!DOCTYPE html>
${clone.outerHTML}`], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'travel_planner_shared.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

</script>
